< index.html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều Muốn Nói... ✨</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #eaeaea 0%, #deebff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 480px;
            width: 90%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(0.9);
            opacity: 0;
        }
        .card.active { transform: scale(1); opacity: 1; }
        h1 { color: #333333; margin-bottom: 25px; font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
        p { 
            color: #555555; 
            font-size: 19px; 
            line-height: 1.7; 
            min-height: 120px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        button {
            background: #222222;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: all 0.3s;
            font-weight: 500;
        }
        button:hover { background: #444444; transform: translateY(-2px); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-screen" class="card active">
        <h1>Gửi người từng là cả thanh xuân... 🕊️</h1>
        <p>Hãy bật âm lượng lên, tìm một nơi yên tĩnh và bấm nút bên dưới nhé.</p>
        <button onclick="startApp()">Mở Ra</button>
    </div>

    <div id="wish-box" class="card hidden">
        <h1 id="title">Điều Muốn Nói... ✨</h1>
        <p id="wish-text">Đang chuẩn bị...</p>
        <button id="next-btn" onclick="nextWish()">Tiếp tục ➡️</button>
    </div>

    <audio id="bg-music" src="music.mp3" loop></audio>

    <script>
        // ==========================================
        // KHU VỰC THAY ĐỔI LỜI MUỐN NÓI CỦA ÔNG
        // Mỗi câu bọc trong dấu ngoặc kép "" và cách nhau bằng dấu phẩy
        // ==========================================
        const wishes = [
            "Hé lô... Không biết dạo này cuộc sống của bạn thế nào rồi? 🌥️",
            "Hôm nay là một ngày đặc biệt, chúc bạn tuổi mới thật nhiều niềm vui, luôn bình yên và hạnh phúc nhé.",
            "Có những khoảng thời gian trôi qua, dù không còn đi chung đường nhưng những kỷ niệm đẹp thì vẫn luôn ở đó.",
            "Cảm ơn bạn vì đã từng xuất hiện và trở thành một phần rực rỡ nhất trong những năm tháng thanh xuân của mình.",
            "Hy vọng ở chặng đường phía trước, bạn sẽ luôn kiên cường, gặp thật nhiều may mắn và đạt được mọi điều mình mong muốn.",
            "Lời cuối cùng: Chúc mừng sinh nhật bạn! Chúc bạn một đời an yên. 🎂✨"
        ];
        // ==========================================

        let currentIndex = 0;
        const music = document.getElementById('bg-music');

        function startApp() {
            // Chạy nhạc
            music.play().catch(err => console.log("Trình duyệt yêu cầu tương tác trước khi phát nhạc."));
            
            // Đổi màn hình
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('hidden');
            
            const wishBox = document.getElementById('wish-box');
            wishBox.classList.remove('hidden');
            setTimeout(() => wishBox.classList.add('active'), 50);
            
            showWish();
        }

        function showWish() {
            const textElement = document.getElementById('wish-text');
            const btn = document.getElementById('next-btn');
            
            textElement.style.opacity = 0;
            
            setTimeout(() => {
                textElement.innerText = wishes[currentIndex];
                textElement.style.opacity = 1;
                
                // Nếu đến câu cuối cùng thì đổi chữ trên nút bấm
                if (currentIndex === wishes.length - 1) {
                    btn.innerText = "Khép lại 🤍";
                }
            }, 400);
        }

        function nextWish() {
            if (currentIndex < wishes.length - 1) {
                currentIndex++;
                showWish();
            } else {
                // Nhấn nút cuối cùng sẽ hiện thông báo nhỏ và tắt hộp thoại
                alert("Cảm ơn bạn vì đã đọc hết những dòng này. Happy Birthday!");
            }
        }
    </script>
</body>
</html>
