<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thanh Xuân... 🕊️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(135deg, #f3ede2 0%, #e3d7c5 100%);
            font-family: 'Georgia', serif; /* Font chữ mang phong cách viết thư cổ điển */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Biểu tượng trang trí cố định hai bên màn hình */
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none; /* Không cản trở việc click nút */
            display: flex;
            justify-content: space-between;
            padding: 10vh 5vw;
            font-size: 24px;
            color: #8d7765;
            opacity: 0.3;
        }

        .decor-left, .decor-right {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 80vh;
        }

        /* Khung lá thư ở giữa */
        .letter-card {
            background: #fdfbf7;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(93, 64, 55, 0.15);
            max-width: 550px;
            width: 90%;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.6s ease-in-out;
            transform: scale(0.95);
            opacity: 0;
            border: 1px solid #ebdccb;
            position: relative;
            z-index: 10;
        }

        .letter-card.active { 
            transform: scale(1); 
            opacity: 1; 
        }

        h1 { 
            color: #3e2723; 
            margin-bottom: 30px; 
            font-size: 22px; 
            font-weight: normal;
            letter-spacing: 1px;
            border-bottom: 1px solid #e0d0c0;
            padding-bottom: 15px;
            width: 100%;
        }

        p { 
            color: #5d4037; 
            font-size: 17px; 
            line-height: 1.8; 
            min-height: 150px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: justify;
            transition: opacity 0.4s ease;
            white-space: pre-line; /* Giữ nguyên xuống dòng */
        }

        button {
            background: #5d4037;
            color: #fdfbf7;
            border: none;
            padding: 12px 35px;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        button:hover { 
            background: #3e2723; 
            transform: translateY(-1px); 
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="decorations">
        <div class="decor-left">
            <div>👼</div>
            <div>✨</div>
            <div>🕊️</div>
            <div>🍂</div>
            <div>🌟</div>
        </div>
        <div class="decor-right">
            <div>🌟</div>
            <div>🍂</div>
            <div>🕊️</div>
            <div>✨</div>
            <div>👼</div>
        </div>
    </div>

    <div id="start-screen" class="letter-card active">
        <h1>Gửi Người Từng Là Cả Thanh Xuân... 🤍</h1>
        <p style="text-align: center;">Anh đặt bút viết những dòng này khi mọi giông bão trong lòng đã thực sự bình lặng...\n\nBật âm lượng, tìm một góc bình yên và mở thư ra em nhé.</p>
        <button onclick="startApp()">Mở Thư</button>
    </div>

    <div id="letter-box" class="letter-card hidden">
        <h1 id="title">Lá Thư Cuối... ✨</h1>
        <p id="letter-text">Đang mở phong thư...</p>
        <button id="next-btn" onclick="nextParagraph()">Đọc tiếp ➡️</button>
    </div>

    <audio id="bg-music" src="music.mp3" loop></audio>

    <script>
        // MẢNG CHỨA CÁC ĐOẠN THƯ CỦA ÔNG
        const paragraphs = [
            "Em thương mến,\n\nAnh đặt bút viết những dòng này khi mọi giông bão trong lòng đã thực sự bình lặng, chỉ còn lại sự thanh thản và một lòng biết ơn vẹn nguyên. Đọc những lời em gửi, anh thấy nhẹ lòng, và anh biết mình cần phải viết cho em một lá thư tử tế – như cái cách chúng ta đã từng bắt đầu.",
            "Chúng ta đã từng đi qua cùng nhau một đoạn đường, có những ngày mưa, những ngày nắng, và cả những khoảnh khắc anh ngỡ rằng chúng ta sẽ là mãi mãi. Nhưng cuộc đời luôn có những ngã rẽ mà cả anh và em đều không thể lường trước.\n\nĐúng như em nói, mỗi người đều có một quỹ đạo riêng, và chuyện tụi mình có duyên gặp gỡ rồi lại phải bỏ lỡ, có lẽ cũng là một sự sắp đặt định mệnh để cả hai cùng trưởng thành. Anh không oán trách, cũng không nuối tiếc, vì ít nhất trong những năm tháng thanh xuân ấy, anh đã được yêu em bằng tất cả những gì chân thành nhất của một người đàn ông.",
            "Em sẽ luôn là my precious angel – thiên thần nhỏ trân quý nhất trong một chương cuộc đời của anh.\n\nDù sau này không còn đồng hành, anh vẫn luôn mong em được hạnh phúc trên con đường em chọn, được sống đúng với mong ước và rực rỡ theo cách của riêng em. Anh cũng sẽ giữ lời hứa, sống trọn vẹn với những lý tưởng mà anh tin tưởng, và học cách tử tế với chính cuộc đời mình trước đã.",
            "Đi qua một đoạn đường thương nhau, điều ý nghĩa nhất để lại không phải là sự sở hữu, mà là việc chúng ta đã tốt lên thế nào sau khi đi qua đời nhau.\n\nHy vọng ở một tương lai nào đó, khi đã đứng ở một tầng tần số khác, khi tam quan đã đủ vững vàng và trưởng thành, nếu có vô tình chạm mặt, chúng ta có thể mỉm cười chào nhau như những người bạn cũ đã từng thương.",
            "Lá thư này là lời chào kết thúc cho câu chuyện của ngày hôm qua, cũng là lời chúc bình an nhất anh để lại nơi em.\n\nTạm biệt em, cô gái của những ngày tháng ấy."
        ];

        let currentIndex = 0;
        const music = document.getElementById('bg-music');

        function startApp() {
            // Phát nhạc nền
            music.play().catch(err => console.log("Trình duyệt yêu cầu tương tác để phát nhạc."));
            
            // Ẩn màn hình mở đầu
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('hidden');
            
            // Hiện màn hình đọc thư
            const letterBox = document.getElementById('letter-box');
            letterBox.classList.remove('hidden');
            setTimeout(() => letterBox.classList.add('active'), 50);
            
            showParagraph();
        }

        function showParagraph() {
            const textElement = document.getElementById('letter-text');
            const btn = document.getElementById('next-btn');
            
            // Hiệu ứng mờ chuyển đoạn
            textElement.style.opacity = 0;
            
            setTimeout(() => {
                textElement.innerText = paragraphs[currentIndex];
                textElement.style.opacity = 1;
                
                // Nếu đến đoạn cuối cùng thì đổi chữ nút bấm
                if (currentIndex === paragraphs.length - 1) {
                    btn.innerText = "Khép lại câu chuyện 🤍";
                }
            }, 400);
        }

        function nextParagraph() {
            if (currentIndex < paragraphs.length - 1) {
                currentIndex++;
                showParagraph();
            } else {
                // Khi bấm nút ở đoạn cuối cùng
                alert("Lá thư đã khép lại. Chúc em một đời an yên!");
            }
        }
    </script>
</body>
</html>
