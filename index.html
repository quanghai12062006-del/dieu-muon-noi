<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Thanh xuân A3 Của Anh... 🤍</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(135deg, #f3ede2 0%, #e3d7c5 100%);
            font-family: 'Lora', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            overflow-y: auto; 
            text-align: center;
            position: relative;
            padding: 40px 0; 
        }
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 10vh 5vw;
            font-size: 24px;
            color: #8d7765;
            opacity: 0.3;
        }

        .decor-left, .decor-right {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 80vh;
        }

        .letter-card {
            background: #fdfbf7;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(93, 64, 55, 0.15);
            max-width: 550px;
            width: 90%;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.6s ease-in-out;
            transform: scale(0.95);
            opacity: 0;
            border: 1px solid #ebdccb;
            position: relative;
            z-index: 10;
        }

        .letter-card.active { 
            transform: scale(1); 
            opacity: 1; 
        }

        h1 { 
            color: #3e2723; 
            margin-bottom: 30px; 
            font-size: 24px; 
            font-weight: 500;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #e0d0c0;
            padding-bottom: 15px;
            width: 100%;
        }

        p { 
            color: #4a332a; 
            font-size: 18px; 
            line-height: 1.8; 
            min-height: 150px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: justify;
            transition: opacity 0.4s ease;
            white-space: pre-line;
        }

        button {
            background: #5d4037;
            color: #fdfbf7;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            font-family: 'Lora', serif;
        }

        button:hover { 
            background: #3e2723; 
            transform: translateY(-2px); 
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="decorations">
        <div class="decor-left">
            <div>👼</div>
            <div>✨</div>
            <div>🕊️</div>
            <div>🍂</div>
            <div>🌟</div>
        </div>
        <div class="decor-right">
            <div>🌟</div>
            <div>🍂</div>
            <div>🕊️</div>
            <div>✨</div>
            <div>👼</div>
        </div>
    </div>

    <div id="start-screen" class="letter-card active">
        <h1>Gửi Thanh xuân A3 Của Anh... 🤍</h1>
        <p style="text-align: center;">Anh đặt bút viết những dòng này khi mọi giông bão trong lòng đã thực sự bình lặng...<br><br>Bật âm lượng, tìm một góc bình yên và mở thư ra em nhé.</p>
        <button onclick="startApp()">Mở Thư</button>
    </div>

    <div id="letter-box" class="letter-card hidden">
        <h1 id="title">Lá Thư Cuối... ✨</h1>
        <p id="letter-text">Đang mở phong thư...</p>
        <button id="next-btn" onclick="nextParagraph()">Đọc tiếp ➡️</button>
    </div>

    <audio id="bg-music" src="music.mp3" loop></audio>

    <script>
        const paragraphs = [
            "Em thương mến,\n\nAnh đặt bút viết những dòng này khi mọi giông bão trong lòng đã thực sự bình lặng, chỉ còn lại sự thanh thản và một lòng biết ơn vẹn nguyên. Đọc những lời em gửi, anh thấy nhẹ lòng, và anh biết mình cần phải viết cho em một lá thư tử tế – như cái cách chúng ta đã từng bắt đầu.",
            "Chúng ta đã từng đi qua cùng nhau một đoạn đường, có những ngày mưa, những ngày nắng, và cả những khoảnh khắc anh ngỡ rằng sẽ che chở em cả đời này. Nhưng cuộc đời luôn có những ngã rẽ mà cả anh và em đều không thể lường trước.\n\nĐúng như em nói, mỗi người đều có một quỹ đạo riêng, và chuyện tụi mình có duyên gặp gỡ rồi lại phải bỏ lỡ, có lẽ cũng là một sự sắp đặt định mệnh để cả hai cùng trưởng thành. Anh không oán trách, cũng không nuối tiếc, vì ít nhất trong gần 1009 ngày tháng thanh xuân ấy (7/4/2023 - 10/1/2026), anh đã được yêu em bằng tất cả những gì chân thành nhất của một người đàn ông.",
            "Em sẽ luôn là một chương rực rỡ nhất trong cuộc đời anh – Người mà anh lần đầu dốc cạn ngọn lửa chân thành, cho anh biết cảm giác quan tâm, chăm sóc một người là thế nào.\n\nDù sau này không còn đồng hành, anh vẫn luôn mong em được hạnh phúc trên con đường em chọn, được sống đúng với mong ước và tỏa sáng rực rỡ theo cách của riêng em. Anh cũng sẽ giữ lời hứa, sống trọn vẹn với những lý tưởng mà anh tin tưởng, và học cách tử tế với chính cuộc đời mình trước đã.",
            "Đi qua một đoạn đường thương nhau, điều ý nghĩa nhất để lại không phải là sự sở hữu, mà là việc chúng ta đã tốt lên thế nào sau khi đi qua đời nhau.\n\nHy vọng ở một tương lai nào đó, khi đã đứng ở một tầng tần số khác, khi tam quan đã đủ vững vàng và trưởng thành, nếu có vô tình chạm mặt, chúng ta có thể mỉm cười chào nhau như những người bạn cũ đã từng thương.",
            "Lá thư này là lời chào kết thúc cho câu chuyện của ngày hôm qua, cũng là lời chúc bình an nhất anh để lại nơi em.\n\nTạm biệt em, Hoàng Hà của những ngày tháng ấy.\n\nQuang Hải - 25/5/2026"
        ];

        let currentIndex = 0;
        const music = document.getElementById('bg-music');
        
        // Các biến kiểm soát giọng đọc
        let playedPhase4 = false;
        let playedPhase5 = false;
        let currentVoice = null;

        function startApp() {
            music.play().catch(err => console.log("Cần tương tác để phát nhạc."));
            
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('hidden');
            
            const letterBox = document.getElementById('letter-box');
            letterBox.classList.remove('hidden');
            setTimeout(() => letterBox.classList.add('active'), 50);
            
            showParagraph();
        }

        function showParagraph() {
            const textElement = document.getElementById('letter-text');
            const btn = document.getElementById('next-btn');
            
            textElement.style.opacity = 0;
            
            setTimeout(() => {
                textElement.innerText = paragraphs[currentIndex];
                textElement.style.opacity = 1;

                // Tắt giọng đọc cũ nếu lướt nhanh sang đoạn mới
                if (currentVoice) {
                    currentVoice.pause();
                    currentVoice.currentTime = 0;
                }
                
                // Kích hoạt giọng đọc đoạn 4
                if (currentIndex === 3 && !playedPhase4) {
                    playedPhase4 = true;
                    currentVoice = new Audio('voice1.mp3');
                    music.volume = 0.08; // Giảm nhạc nền
                    currentVoice.playbackRate = 0.9;
                    currentVoice.volume = 1.0;
                    currentVoice.play().catch(err => console.log("Lỗi: Chưa có file voice1.mp3"));
                    
                    currentVoice.onended = function() {
                        music.volume = 0.4; // Đọc xong nhạc to lên chút
                    };
                }
                
                // Kích hoạt giọng đọc đoạn cuối
                if (currentIndex === paragraphs.length - 1 && !playedPhase5) {
                    playedPhase5 = true;
                    currentVoice = new Audio('voice2.mp3');
                    music.volume = 0.08; // Giảm nhạc nền
                    currentVoice.volume = 1.0;
                    currentVoice.playbackRate = 0.8;
                    currentVoice.play().catch(err => console.log("Lỗi: Chưa có file voice2.mp3"));
                    
                    currentVoice.onended = function() {
                       music.volume = 0.5; // Đọc lời chào cuối xong tắt luôn nhạc
                    };
                }
                
                if (currentIndex === paragraphs.length - 1) {
                    btn.innerText = "Khép lại câu chuyện 🤍";
                } else {
                    btn.innerText = "Đọc tiếp ➡️";
                }
            }, 400);
        }

        function nextParagraph() {
            if (currentIndex < paragraphs.length - 1) {
                currentIndex++;
                showParagraph();
            } else {
                alert("Lá thư đã khép lại. Chúc em một đời an yên!");
            }
        }
    </script>
</body>
</html>
